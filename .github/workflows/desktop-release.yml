name: Desktop Release (Tauri)

# Builds Tauri desktop packages for Windows, macOS (Intel + Apple Silicon) and Linux.
#
# Triggers:
# - Tag starting with "desktop-v*" creates a GitHub Release with all installers attached
# - workflow_dispatch can be used to test the build without releasing
#
# Code signing is optional. Without APPLE_SIGNING_IDENTITY the macOS app is
# ad-hoc signed (will trigger Gatekeeper warning on user machines).

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            label: mac-arm64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            label: mac-x64
          - platform: ubuntu-24.04
            args: ""
            label: linux-x64
          - platform: windows-latest
            args: ""
            label: win-x64

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Detect macOS signing identity
        id: mac_signing
        if: matrix.platform == 'macos-latest'
        env:
          IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -n "$IDENTITY" ]; then
            echo "identity=$IDENTITY" >> "$GITHUB_OUTPUT"
          else
            # `-` tells Tauri to skip codesign (ad-hoc). Without this, tauri-bundler
            # errors out looking up an identity that doesn't exist.
            echo "identity=-" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Tauri app
        env:
          APPLE_SIGNING_IDENTITY: ${{ steps.mac_signing.outputs.identity }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- ${{ matrix.args }}

      - name: Collect installers
        shell: bash
        run: |
          cd src-tauri/target
          mkdir -p /tmp/tauri-dist
          shopt -s globstar nullglob
          for pattern in \
            "**/release/bundle/dmg/*.dmg" \
            "**/release/bundle/msi/*.msi" \
            "**/release/bundle/nsis/*.exe" \
            "**/release/bundle/appimage/*.AppImage" \
            "**/release/bundle/deb/*.deb" \
            "**/release/bundle/rpm/*.rpm"; do
            for f in $pattern; do
              [ -f "$f" ] && cp -v "$f" /tmp/tauri-dist/
            done
          done
          ls -la /tmp/tauri-dist/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}
          path: /tmp/tauri-dist/
          if-no-files-found: warn
          retention-days: 30

  release:
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: dist
          merge-multiple: true

      - name: List files
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Reminder Hub Desktop ${{ github.ref_name }}"
          draft: true
          prerelease: false
          files: dist/*
          body: |
            Reminder Hub desktop installers.

            Download the one matching your platform:
            - **Windows**: `.msi` (recommended) or `.exe`
            - **macOS**: `.dmg` (arm64 for Apple Silicon, x64 for Intel). Unsigned builds will trigger Gatekeeper; right-click → Open to bypass on first launch.
            - **Linux**: `.AppImage` (universal) or `.deb` (Debian/Ubuntu)
