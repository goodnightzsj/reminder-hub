name: Desktop Release (Tauri)

# Builds Tauri desktop packages for Windows, macOS (Intel + Apple Silicon) and Linux.
#
# Triggers:
# - Tag starting with "desktop-v*" creates a GitHub Release with all installers attached
# - workflow_dispatch can be used to test the build without releasing
#
# Code signing is optional. Without APPLE_SIGNING_IDENTITY the macOS app is
# ad-hoc signed (will trigger Gatekeeper warning on user machines).

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            label: mac-arm64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            label: mac-x64
          - platform: ubuntu-24.04
            args: ""
            label: linux-x64
          - platform: windows-latest
            args: ""
            label: win-x64

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      # Setting env via GITHUB_ENV only when a secret is non-empty avoids passing
      # APPLE_TEAM_ID="" (which tauri interprets as "please notarize" and fails).
      - name: Prepare signing env
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY_SECRET: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD_SECRET: ${{ secrets.APPLE_PASSWORD }}
          WINDOWS_CERTIFICATE_SECRET: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD_SECRET: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          TAURI_SIGNING_KEY_SECRET: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_KEY_PW_SECRET: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [[ "${{ matrix.platform }}" == macos-* ]]; then
            if [ -n "$APPLE_SIGNING_IDENTITY_SECRET" ]; then
              # Full notarize-capable build
              echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY_SECRET" >> "$GITHUB_ENV"
              [ -n "$APPLE_TEAM_ID_SECRET" ] && echo "APPLE_TEAM_ID=$APPLE_TEAM_ID_SECRET" >> "$GITHUB_ENV"
              [ -n "$APPLE_ID_SECRET" ] && echo "APPLE_ID=$APPLE_ID_SECRET" >> "$GITHUB_ENV"
              [ -n "$APPLE_PASSWORD_SECRET" ] && echo "APPLE_PASSWORD=$APPLE_PASSWORD_SECRET" >> "$GITHUB_ENV"
            else
              # Ad-hoc sign only. Do NOT set TEAM_ID/APPLE_ID/PASSWORD so tauri
              # does not attempt notarization (which fails on empty Team ID).
              echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
            fi
          fi

          if [[ "${{ matrix.platform }}" == windows-* ]] && [ -n "$WINDOWS_CERTIFICATE_SECRET" ]; then
            echo "WINDOWS_CERTIFICATE=$WINDOWS_CERTIFICATE_SECRET" >> "$GITHUB_ENV"
            echo "WINDOWS_CERTIFICATE_PASSWORD=$WINDOWS_CERTIFICATE_PASSWORD_SECRET" >> "$GITHUB_ENV"
          fi

          if [ -n "$TAURI_SIGNING_KEY_SECRET" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY=$TAURI_SIGNING_KEY_SECRET" >> "$GITHUB_ENV"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$TAURI_SIGNING_KEY_PW_SECRET" >> "$GITHUB_ENV"
          fi

      - name: Build Tauri app
        run: npm run tauri build -- ${{ matrix.args }}

      - name: Collect installers
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/tauri-dist"
          # macOS ships bash 3.2 (no globstar), so we use `find` for portability.
          find src-tauri/target -type d -name bundle -print0 | \
          while IFS= read -r -d '' bundle_dir; do
            find "$bundle_dir" -type f \( \
              -name "*.dmg" -o \
              -name "*.msi" -o \
              -name "*.exe" -o \
              -name "*.AppImage" -o \
              -name "*.deb" -o \
              -name "*.rpm" \
            \) -exec cp -v {} "$RUNNER_TEMP/tauri-dist/" \;
          done
          ls -la "$RUNNER_TEMP/tauri-dist/" || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}
          path: ${{ runner.temp }}/tauri-dist/
          if-no-files-found: warn
          retention-days: 30

  release:
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: dist
          merge-multiple: true

      - name: List files
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Reminder Hub Desktop ${{ github.ref_name }}"
          draft: true
          prerelease: false
          files: dist/*
          body: |
            Reminder Hub desktop installers.

            Download the one matching your platform:
            - **Windows**: `.msi` (recommended) or `.exe`
            - **macOS**: `.dmg` (arm64 for Apple Silicon, x64 for Intel). Unsigned builds will trigger Gatekeeper; right-click → Open to bypass on first launch.
            - **Linux**: `.AppImage` (universal) or `.deb` (Debian/Ubuntu)
