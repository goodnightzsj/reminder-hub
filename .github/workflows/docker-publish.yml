name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - "apps/desktop/**"
      - "apps/mobile/**"
      - "ios/**"
      - "android/**"
      - ".github/workflows/desktop-release.yml"
      - ".github/workflows/android-release.yml"
      - ".github/workflows/ios-release.yml"
      - ".github/workflows/ci.yml"
      - "**/*.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "apps/desktop/**"
      - "apps/mobile/**"
      - "ios/**"
      - "android/**"
      - ".github/workflows/desktop-release.yml"
      - ".github/workflows/android-release.yml"
      - ".github/workflows/ios-release.yml"
      - ".github/workflows/ci.yml"
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify app build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: npm run check

  docker:
    name: Build and publish multi-arch image
    runs-on: ubuntu-latest
    needs: verify
    env:
      DOCKERHUB_USERNAME_VAR: ${{ vars.DOCKERHUB_USERNAME }}
      DOCKERHUB_USERNAME_SECRET: ${{ secrets.DOCKERHUB_USERNAME }}
      IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE_NAME || github.event.repository.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Docker Hub image repository
        id: image
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          trim_single_line() {
            printf '%s' "$1" | tr -d '\r\n' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//'
          }

          DOCKERHUB_USERNAME="$(trim_single_line "${DOCKERHUB_USERNAME_VAR:-${DOCKERHUB_USERNAME_SECRET:-}}")"
          IMAGE_NAME_CLEAN="$(trim_single_line "${IMAGE_NAME}")"

          test -n "${DOCKERHUB_USERNAME}" || {
            echo "Missing Docker Hub username. Set Actions Variable DOCKERHUB_USERNAME (preferred) or Secret DOCKERHUB_USERNAME."
            exit 1
          }

          test -n "${IMAGE_NAME_CLEAN}" || {
            echo "Missing Docker image name. Set Actions Variable DOCKERHUB_IMAGE_NAME or use a non-empty GitHub repository name."
            exit 1
          }

          case "${DOCKERHUB_USERNAME}" in
            */*|*:*|*" "*)
              echo "Invalid Docker Hub username: must be a single namespace without spaces, slash, or colon."
              exit 1
              ;;
          esac

          case "${IMAGE_NAME_CLEAN}" in
            */*|*:*|*" "*)
              echo "Invalid Docker image name: must not contain spaces, slash, or colon."
              exit 1
              ;;
          esac

          if [ "${GITHUB_EVENT_NAME}" != "pull_request" ]; then
            test -n "${DOCKERHUB_TOKEN}" || {
              echo "Missing Docker Hub token. Set Actions Secret DOCKERHUB_TOKEN."
              exit 1
            }
          fi

          IMAGE_REPOSITORY="${DOCKERHUB_USERNAME}/${IMAGE_NAME_CLEAN}"
          echo "dockerhub_username=${DOCKERHUB_USERNAME}" >> "$GITHUB_OUTPUT"
          echo "image_repository=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "Resolved Docker image repository: ${IMAGE_REPOSITORY}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ steps.image.outputs.dockerhub_username }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image_repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
