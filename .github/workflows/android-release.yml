name: Android Release (Capacitor)

# Builds the Capacitor Android APK/AAB.
#
# Triggers:
# - Tag starting with "v*" uploads APK (+ AAB when signed) to the unified
#   Release shared with the Desktop/iOS workflows.
# - workflow_dispatch can be used for test builds (unsigned debug APK artifact).
#
# Required secrets for SIGNED release builds:
#   ANDROID_KEYSTORE_BASE64          Base64-encoded .jks/.keystore file
#   ANDROID_KEYSTORE_PASSWORD        Password for the keystore file
#   ANDROID_KEY_ALIAS                Alias inside the keystore
#   ANDROID_KEY_PASSWORD             Password for the alias
#
# Without these secrets the workflow builds an unsigned debug APK (useful for
# sideloading during development).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Install JavaScript dependencies
        run: npm install

      - name: Build web bundle
        run: npm run build

      - name: Add Android platform (first run)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Detect keystore secret
        id: keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode keystore
        if: steps.keystore.outputs.present == 'true'
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > android/app/release.keystore

      - name: Configure signing
        if: steps.keystore.outputs.present == 'true'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat >> android/gradle.properties <<EOF
          RELEASE_STORE_FILE=release.keystore
          RELEASE_STORE_PASSWORD=${KEYSTORE_PASSWORD}
          RELEASE_KEY_ALIAS=${KEY_ALIAS}
          RELEASE_KEY_PASSWORD=${KEY_PASSWORD}
          EOF

      - name: Patch build.gradle for release signing (when keystore present)
        if: steps.keystore.outputs.present == 'true'
        run: |
          python3 <<'EOF'
          import re
          from pathlib import Path
          gradle = Path("android/app/build.gradle")
          text = gradle.read_text()
          if "signingConfigs" not in text:
              signing_block = """
              signingConfigs {
                  release {
                      if (project.hasProperty('RELEASE_STORE_FILE')) {
                          storeFile file(RELEASE_STORE_FILE)
                          storePassword RELEASE_STORE_PASSWORD
                          keyAlias RELEASE_KEY_ALIAS
                          keyPassword RELEASE_KEY_PASSWORD
                      }
                  }
              }
          """
              text = re.sub(r"(android\s*\{\s*\n)", r"\1" + signing_block, text, count=1)
          text = re.sub(
              r"(release\s*\{\s*\n)",
              r"\1            signingConfig signingConfigs.release\n",
              text,
              count=1,
          )
          gradle.write_text(text)
          print("Patched android/app/build.gradle")
          EOF

      - name: Build APK (debug fallback when no keystore)
        id: build
        run: |
          cd android
          if [ "${{ steps.keystore.outputs.present }}" = "true" ] && [ "${{ github.event.inputs.build_type }}" != "debug" ]; then
            ./gradlew assembleRelease bundleRelease --no-daemon
            echo "type=release" >> "$GITHUB_OUTPUT"
          else
            ./gradlew assembleDebug --no-daemon
            echo "type=debug" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ steps.build.outputs.type }}
          path: |
            apps/mobile/android/app/build/outputs/apk/${{ steps.build.outputs.type }}/*.apk
            apps/mobile/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Reminder Hub ${{ github.ref_name }}"
          draft: true
          prerelease: false
          # Shared body source with Desktop + iOS workflows. softprops v2 only
          # writes body on initial release creation — whichever workflow wins
          # the race writes from this same file, so the body is deterministic.
          body_path: .github/RELEASE_BODY.md
          generate_release_notes: true
          files: |
            apps/mobile/android/app/build/outputs/apk/${{ steps.build.outputs.type }}/*.apk
            apps/mobile/android/app/build/outputs/bundle/release/*.aab
