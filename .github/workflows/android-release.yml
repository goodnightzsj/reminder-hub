name: Android Release (Capacitor)

# Builds the Capacitor Android APK/AAB.
#
# Triggers:
# - Tag starting with "android-v*" creates a GitHub Release with the signed APK + AAB
# - workflow_dispatch can be used for test builds (unsigned debug APK artifact)
#
# Required secrets for SIGNED release builds:
#   ANDROID_KEYSTORE_BASE64          Base64-encoded .jks/.keystore file
#   ANDROID_KEYSTORE_PASSWORD        Password for the keystore file
#   ANDROID_KEY_ALIAS                Alias inside the keystore
#   ANDROID_KEY_PASSWORD             Password for the alias
#
# Without these secrets the workflow builds an unsigned debug APK (useful for
# sideloading during development).

on:
  push:
    tags:
      - "android-v*"
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Install JavaScript dependencies
        run: npm install

      - name: Build web bundle
        run: npm run build

      - name: Add Android platform (first run)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Detect keystore secret
        id: keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode keystore
        if: steps.keystore.outputs.present == 'true'
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > android/app/release.keystore

      - name: Configure signing
        if: steps.keystore.outputs.present == 'true'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat >> android/gradle.properties <<EOF
          RELEASE_STORE_FILE=release.keystore
          RELEASE_STORE_PASSWORD=${KEYSTORE_PASSWORD}
          RELEASE_KEY_ALIAS=${KEY_ALIAS}
          RELEASE_KEY_PASSWORD=${KEY_PASSWORD}
          EOF

      - name: Build debug APK
        if: github.ref_type != 'tag' && (github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == '')
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Build signed release APK + AAB
        if: github.ref_type == 'tag' || github.event.inputs.build_type == 'release'
        run: |
          cd android
          ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Upload debug APK artifact
        if: github.ref_type != 'tag' && (github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == '')
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload release artifacts
        if: github.ref_type == 'tag' || github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            apps/mobile/android/app/build/outputs/apk/release/*.apk
            apps/mobile/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/mobile/android/app/build/outputs/apk/release/*.apk
            apps/mobile/android/app/build/outputs/bundle/release/*.aab
          draft: true
          prerelease: false
          name: "Reminder Hub Android ${{ github.ref_name }}"
          body: |
            Reminder Hub Android build.

            - `*.apk` — sideload directly
            - `*.aab` — upload to Google Play Console
