name: iOS Release (Capacitor)

# Builds the Capacitor iOS app. If Apple Developer secrets are set, produces
# a signed .ipa ready for App Store upload. Otherwise falls back to an
# unsigned xcarchive that you can re-sign locally in Xcode.
#
# Triggers:
# - Tag starting with "ios-v*" creates a GitHub Release with the .ipa or .xcarchive
# - workflow_dispatch runs the same logic without creating a Release
#
# Required secrets for signed builds (all must be present):
#   IOS_P12_BASE64                   Base64-encoded developer .p12 distribution certificate
#   IOS_P12_PASSWORD                 Password for the .p12 file
#   IOS_PROVISIONING_PROFILE_BASE64  Base64-encoded .mobileprovision file
#   IOS_PROVISIONING_PROFILE_NAME    The profile's name (as shown in Apple Developer Portal)
#   APPLE_TEAM_ID                    10-char Apple Developer team ID
#   IOS_KEYCHAIN_PASSWORD            Any random string used to unlock the temp keychain

on:
  push:
    tags:
      - "ios-v*"
  workflow_dispatch:

concurrency:
  group: ios-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest-stable"

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Install JavaScript dependencies
        run: npm install

      - name: Build web bundle
        run: npm run build

      - name: Add iOS platform (first run)
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods deps
        run: |
          cd ios/App
          pod install --repo-update

      - name: Detect Apple signing secrets
        id: secrets
        env:
          P12_B64: ${{ secrets.IOS_P12_BASE64 }}
          PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$P12_B64" ] && [ -n "$PROFILE_B64" ] && [ -n "$TEAM_ID" ]; then
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      # ---------- SIGNED PATH ----------
      - name: Import signing certificate
        if: steps.secrets.outputs.signed == 'true'
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "$IOS_P12_BASE64" | base64 -d > "$CERT_PATH"
          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        if: steps.secrets.outputs.signed == 'true'
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -d \
            > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Build signed .ipa
        if: steps.secrets.outputs.signed == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          cd ios/App
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.reminderhub.mobile</key>
              <string>${IOS_PROVISIONING_PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/App.xcarchive \
            archive

          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist

      # ---------- UNSIGNED FALLBACK (SIMULATOR BUILD) ----------
      # Without signing secrets we build for iOS Simulator instead of
      # `generic/platform=iOS`. Simulator builds don't require any code
      # signing, and the resulting `.app` can be dragged into Simulator.app
      # on a Mac or installed with `xcrun simctl install`.
      - name: Build unsigned simulator .app
        if: steps.secrets.outputs.signed != 'true'
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS Simulator" \
            -sdk iphonesimulator \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build

      - name: Pack simulator .app for upload
        if: steps.secrets.outputs.signed != 'true'
        run: |
          cd ios/App/build/Build/Products/Release-iphonesimulator
          tar -czf App-simulator.app.tar.gz App.app
          mkdir -p ../../../../release
          cp App-simulator.app.tar.gz ../../../../release/

      # ---------- UPLOAD ----------
      - name: Upload signed .ipa as artifact
        if: steps.secrets.outputs.signed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: apps/mobile/ios/App/build/ipa/*.ipa
          retention-days: 30

      - name: Upload unsigned simulator .app as artifact
        if: steps.secrets.outputs.signed != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: apps/mobile/ios/App/release/App-simulator.app.tar.gz
          retention-days: 30

      # ---------- RELEASE ----------
      - name: Create GitHub Release (signed)
        if: github.ref_type == 'tag' && steps.secrets.outputs.signed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: apps/mobile/ios/App/build/ipa/*.ipa
          draft: true
          prerelease: false
          name: "Reminder Hub iOS ${{ github.ref_name }}"
          body: |
            Signed iOS build. Upload to App Store Connect via Transporter or `xcrun altool`.

      - name: Create GitHub Release (simulator build)
        if: github.ref_type == 'tag' && steps.secrets.outputs.signed != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: apps/mobile/ios/App/release/App-simulator.app.tar.gz
          draft: true
          prerelease: false
          name: "Reminder Hub iOS ${{ github.ref_name }} (simulator)"
          body: |
            Unsigned iOS Simulator build. Usage:

            ```bash
            tar -xzf App-simulator.app.tar.gz
            xcrun simctl install booted App.app   # install to the running simulator
            xcrun simctl launch booted com.reminderhub.mobile
            ```

            For real-device builds, configure Apple Developer secrets
            (see BUILDING.md) and re-tag to produce a signed .ipa.
